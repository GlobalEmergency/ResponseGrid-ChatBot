name: CI y deploy a srv07

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      # Los tests unitarios importan el módulo del agente, que valida OPENAI_API_KEY
      # al cargarse (fail-fast en producción). En CI basta un valor dummy: ningún
      # test hace llamadas reales a OpenAI (el `run` del agente está mockeado).
      - run: npm test
        env:
          OPENAI_API_KEY: test-dummy-key

  deploy:
    # Solo en push a main (no en PRs) y solo si CI pasó.
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-srv07
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Construye los artefactos de producción en el runner.
      - run: npm ci
      - run: npm run build

      # Copia solo lo necesario para ejecutar en producción.
      # No toca .env, accounts.json, .sessions/ ni node_modules del servidor.
      - name: Copiar artefactos a srv07
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SRV07_HOST }}
          username: ${{ secrets.SRV07_USER }}
          key: ${{ secrets.SRV07_SSH_KEY }}
          port: ${{ secrets.SRV07_PORT }}
          source: "dist/**,package.json,package-lock.json,ecosystem.config.cjs"
          target: ${{ secrets.SRV07_DEPLOY_PATH }}
          overwrite: true

      - name: Instalar deps de producción y recargar PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SRV07_HOST }}
          username: ${{ secrets.SRV07_USER }}
          key: ${{ secrets.SRV07_SSH_KEY }}
          port: ${{ secrets.SRV07_PORT }}
          script: |
            set -eu
            export PATH="/opt/plesk/node/24/bin:$PATH"
            export PM2_HOME="$HOME/.pm2"
            cd "${{ secrets.SRV07_DEPLOY_PATH }}"
            npm ci --omit=dev
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
